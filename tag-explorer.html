<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bestseller Tags</title>
  <link rel="stylesheet" href="./tag-explorer.css" />
  <!-- Tabler icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>

  <div class="showcase">

    <p class="showcase-title">Bestseller tag options</p>

    <!-- Option 6: Ribbon corner -->
    <div class="tag-row">
      <span class="tag-label">Option 1 — ribbon corner</span>
      <span class="tag-ribbon-wrap">
        <span class="tag-ribbon">
          <i class="ti ti-medal tag-icon" aria-hidden="true"></i>
          Bestseller
        </span>
      </span>
    </div>

    <hr class="divider" />

    <!-- Option 8: Marching border -->
    <div class="tag-row">
      <span class="tag-label">Option 2 — marching border</span>
      <span class="tag-neon-outer">
        <span class="tag-neon">
          <span class="neon-dot"></span>
          Bestseller
        </span>
      </span>
    </div>

    <hr class="divider" />

    <!-- Option 9: Star badge -->
    <div class="tag-row">
      <span class="tag-label">Option 3 — star badge</span>
      <span class="tag-stars">
        <i class="ti ti-star tag-icon" aria-hidden="true"></i>
        Bestseller v1
      </span>
    </div>

  </div>

</body>
</html>
