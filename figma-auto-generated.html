<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete the Look Bundle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bundle">
    <h2 class="bundle-title">Complete the Look &amp; Save 15%</h2>
    <p class="bundle-sub">Add these matching items to your cart for a full set</p>

    <div class="bundle-row">
      <!-- Card 1 -->
      <div class="pcard">
        <div class="photo">
          <img src="tshirt.jpg" alt="Women Disty Print T-shirt" />
          <div class="check" aria-label="Selected">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>
        <div class="info">
          <div class="brand">SMUKK</div>
          <div class="name">Women Disty Print..</div>
          <div class="price-row">
            <span class="price">₹499</span>
            <span class="strike">₹599</span>
            <span class="discount">51%</span>
          </div>
        </div>
      </div>

      <!-- + connector -->
      <div class="connector" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>

      <!-- Card 2 -->
      <div class="pcard">
        <div class="photo">
          <img src="jeans.jpg" alt="Magenta Above Knee Jeans" />
        </div>
        <div class="info">
          <div class="brand">SMUKK</div>
          <div class="name">Magenta Above Kn..</div>
          <div class="price-row">
            <span class="price">₹899</span>
            <span class="strike">₹3,499</span>
            <span class="discount">51%</span>
          </div>
        </div>
      </div>
    </div>

    <button class="bundle-cta" type="button">Add Bundle</button>
  </div>

</body>
</html>
